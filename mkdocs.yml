site_name: Courtney Avioli
site_description: Portfolio
site_author: Courtney Avioli
site_url: https://court-av.github.io/Portfolio/

repo_url: https://github.com/court-av/Portfolio
repo_name: Courtney's Github

theme:
  name: material
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.instant
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
    - toc.follow
  palette:
    - scheme: default
      primary: black
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: black
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  - tables
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true
      toc_depth: 3

nav:
  - Home: index.md
  - Projects:
    - Sample Project: projects/project.md
  - Technical Writing Examples:
    - Set Up Your Own Website: guides/website_setup_mkdocs.md
    - Configuring an e-Paper Display on Raspberry Pi: guides/epaper_pi.md
    - Creating an Exploded Assembly Drawing in SolidWorks: guides/exploded_assembly.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/court-av
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/in/courtneyavioli
  generator: true
